<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>

    <!-- ===== Navigation Bar ===== -->
    <nav>
        <a href="../index.html">Home</a> |
        <a href="education.html">Education</a> |
        <a href="experience.html">Experience</a> |
        <a href="projects.html">Projects</a> |
    </nav>

    <hr>



    <form action="#" method="post">


        <table>
            <tr>
                <td><label for="firstName*">First Name* </label></td>
                <td><input type="text" id="firstName" name="firstName" required></td>
            </tr>
            <tr>
                <td><label for="lastName">Last Name* </label></td>
                <td><input type="text" id="lastName" name="lastName" required></td>
            </tr>
            <tr>
                <td><label for="company">Company </label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>
            <tr>
                <td><label for="addressone">Address 1* </label></td>
                <td><input type="text" id="addressone" name="addressone" required></td>
            </tr>
            <tr>
                <td><label for="addresstwo">Address 2 </label></td>
                <td><input type="text" id="addresstwo" name="addresstwo"></td>
            </tr>
            <tr>
                <td><label for="city">City* </label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>
            <tr>
                <td><label for="state">State* </label><br></td>
                <td><select id="state" name="state">
                        <option value="">Select a State</option>
                        <option value="job">Rangpur</option>
                        <option value="projects">Dhaka</option>
                        <option value="thesis">Chittagong</option>
                    </select></td>
            </tr>
            <tr>
                <td><label>Zip Code* </label></td>
                <td><input type="text" pattern="[A-Za-z]{1-9}" required></td>

            </tr>

            <tr>
                <td><label for="country">Country* </label><br></td>
                <td><select id="country" name="country">
                        <option value="">Select a Country</option>
                        <option value="job">Bangladesh</option>
                        <option value="projects">America</option>
                        <option value="thesis">England</option>
                    </select></td>
            </tr>
            <tr>
                <td><label for="phone">Phone </label></td>
                <td><input type="tel" id="phone" name="phone"></td>

            </tr>
            <tr>
                <td><label for="fax">Fax </label></td>
                <td><input type="tel" id="fax" name="fax"></td>

            </tr>
            <tr>
                <td><label for="email">Email* </label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>

            <tr>
                <td><label>Donation Amount* </label>
                    <p><small>(Check a button or type in your amount)</small></p>
                </td>
                <td>
                    <label><input type="radio" name="number" value="none"> None</label>
                    <label><input type="radio" name="number" value="50"> $50</label>
                    <label><input type="radio" name="number" value="75"> $75</label>
                    <label><input type="radio" name="number" value="100"> $100</label>
                    <label><input type="radio" name="number" value="250"> $250</label>
                    <label><input type="radio" name="number" value="other"> other</label>

                </td>
            </tr>
            <tr>
                <td></td>
                <td><label for="otherammount">Other Ammount $ </label>
                    <input type="tel" id="otherammount" name="otherammount">
                </td>

            </tr>
            <tr>
            <tr>
                <td><label>Recurring Donation</label>
                    <p><small>(Check if yes)</small></p>
                </td>

                <td>
                    <label><input type="checkbox" value="nummber">I am interested in giving on a regular
                        basis</label>



                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <label>Monthly Credit Card$</label>
                    <input type="number" min="500" max="25000">


                    <label>For</label>
                    <input type="number" min="500" max="25000">
                </td>
                <td><label>Month</label></td>

            </tr>



            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Continue">
                    <input type="reset" value="Reset">
                </td>
            </tr>


        </table>

    </form>

    <hr>



</body>

</html>
