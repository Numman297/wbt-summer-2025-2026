<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form method="post">


        <p class="form-header-label"><b>Create your Account</b></p>

        <p class="form-header-title">Join us in a couple of steps.</p>

        <div class="form_feild">
            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
        </div>

        <div class="form_feild">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="">
        </div>

        <div class="form_feild">
            <label for="dob">Date of birth</label>
            <input type="datetime-local" id="dob" name="dob">
        </div>

        <div class="form_feild">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email">
        </div>
        <div class="form_field">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="*****">
        </div>
        <div class="radio_btn">
            <P>Pareferd Contact</P>
            <label><input type="radio" name="contact" value="email"> Email</label>
            <label><input type="radio" name="contact" value="phone"> Phone</label>
            <label><input type="radio" name="contact" value="sms"> SMS</label>
        </div>


        <div class="form-buttons">
            <button type="submit" class="btn-primary">Submit</button>
            <button type="reset" class="btn-secondary">Reset</button>
        </div>



        </div>




    </form>







</body>

</html>
