<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form method="post">


        <p class="form-header-label"><b>Registration</b></p>
        <p class="form-header-title">Please cpmplete all feilds below</p>
        <hr>

        <div class="form_feild">
            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
        </div>

        <div class="form_feild">
            <label for="code">Postal Code</label>
            <input type="number" id="code" name="code" placeholder="1001">
        </div>

        <div class="form_feild">
            <label for="dob">Date of birth</label>
            <input type="datetime-local" id="dob" name="dob">
        </div>

        <div class="form_feild">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email">
        </div>
        <div class="form_field">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="*****">
        </div>
        <div class="form_field">
            <label for="Country">Country</label>

            <select id="country" name="country">
                <option value="">Select a country...</option>
                <option>Bangladesh</option>
                <option>Dhaka</option>
                <option>Chittagong</option>
            </select>
        </div>
        <div class="form-buttons">
            <button type="submit" class="btn-primary">Submit</button>
            <button type="reset" class="btn-secondary">Reset</button>
        </div>











        </div>




    </form>







</body>

</html>
